<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Finance Tracker</title>
  <meta name="theme-color" content="#4F46E5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Finance" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f5;color:#1a1a1a;height:100vh;overflow:hidden;display:flex;flex-direction:column}

    header{background:#4F46E5;color:white;padding:1rem 1rem 0;padding-top:calc(1rem + env(safe-area-inset-top));flex-shrink:0;z-index:10}
    .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
    .header-top h1{font-size:18px;font-weight:600}
    .header-actions{display:flex;gap:6px}
    .hbtn{background:rgba(255,255,255,0.2);border:none;color:white;border-radius:8px;padding:5px 11px;font-size:13px;cursor:pointer}
    .hbtn:active{background:rgba(255,255,255,0.35)}
    .tabs-scroll{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
    .tabs-scroll::-webkit-scrollbar{display:none}
    .tab{flex-shrink:0;padding:7px 14px;border-radius:8px 8px 0 0;font-size:13px;font-weight:500;cursor:pointer;background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.75);border:none;white-space:nowrap;display:flex;align-items:center;gap:6px}
    .tab.active{background:#f0f0f5;color:#4F46E5}
    .tab .dx{font-size:14px;opacity:.5;padding:0 0 0 2px}

    .nav-pills{display:flex;background:#f0f0f5;padding:8px 1rem 4px;gap:6px;flex-shrink:0}
    .pill{flex:1;text-align:center;padding:6px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:#888;border:none;background:none}
    .pill.active{background:white;color:#4F46E5;box-shadow:0 1px 3px rgba(0,0,0,.1)}

    .dots{display:flex;justify-content:center;gap:6px;padding:6px 0 2px;flex-shrink:0}
    .dot{width:6px;height:6px;border-radius:50%;background:#ccc;transition:background .2s,width .2s}
    .dot.active{background:#4F46E5;width:18px;border-radius:3px}
    .swipe-hint{text-align:center;font-size:12px;color:#bbb;padding:4px 0 2px;flex-shrink:0}

    .swipe-viewport{flex:1;overflow:hidden;position:relative}
    .swipe-track{display:flex;height:100%;transition:transform .3s cubic-bezier(.4,0,.2,1);will-change:transform}
    .page{min-width:100vw;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .pad{padding:1rem 1rem 2rem}

    .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
    .metric{background:white;border-radius:12px;padding:.75rem .5rem;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.07)}
    .metric-label{font-size:11px;color:#888;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
    .metric-value{font-size:17px;font-weight:600;color:#1a1a1a}
    .metric-value.danger{color:#dc2626}
    .metric-value.success{color:#16a34a}
    .progress-bar-bg{background:#e5e7eb;border-radius:99px;height:5px;margin-top:.6rem;overflow:hidden}
    .progress-bar{height:5px;border-radius:99px;background:#4F46E5;transition:width .3s}
    .progress-bar.warn{background:#f59e0b}
    .progress-bar.over{background:#dc2626}

    .card{background:white;border-radius:14px;padding:.9rem 1rem;margin-bottom:.85rem;box-shadow:0 1px 3px rgba(0,0,0,.07)}
    .card-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem;display:flex;align-items:center;justify-content:space-between}
    .card-title-btn{font-size:11px;font-weight:500;color:#4F46E5;background:none;border:none;cursor:pointer;padding:0}

    input,select{width:100%;border:1.5px solid #e5e7eb;border-radius:8px;padding:0 12px;height:40px;font-size:15px;background:#fafafa;color:#1a1a1a;outline:none;-webkit-appearance:none}
    input:focus,select:focus{border-color:#4F46E5;background:white}

    .budget-row{display:flex;align-items:center;gap:8px}
    .budget-row label{font-size:14px;color:#555;white-space:nowrap}
    .budget-row input{max-width:130px}

    .add-row{display:grid;grid-template-columns:1fr 105px 42px;gap:7px;margin-bottom:7px}
    .add-btn{background:#4F46E5;color:white;border:none;border-radius:8px;width:42px;height:40px;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .add-btn:active{background:#4338CA;transform:scale(.95)}

    .entries-table{width:100%;border-collapse:collapse;font-size:13px}
    .entries-table th{font-size:10px;font-weight:600;color:#888;text-align:left;padding:0 0 7px;border-bottom:1px solid #f0f0f0;text-transform:uppercase}
    .entries-table th.r{text-align:right}
    .entries-table td{padding:9px 0;border-bottom:1px solid #f0f0f0;vertical-align:middle}
    .entries-table td.r{text-align:right;font-variant-numeric:tabular-nums}
    .entries-table tr:last-child td{border-bottom:none}
    .del-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:17px;padding:0 2px}
    .del-btn:active{color:#dc2626}
    .empty{color:#bbb;font-size:14px;text-align:center;padding:1.5rem 0}

    .badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;white-space:nowrap;display:inline-block}

    /* CATEGORY MANAGER */
    .cat-list{display:flex;flex-direction:column;gap:6px;margin-bottom:.75rem}
    .cat-row{display:flex;align-items:center;gap:8px}
    .cat-color-btn{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px}
    .cat-color-btn:active{transform:scale(.9)}
    .cat-name-input{flex:1;height:36px;font-size:14px}
    .cat-del-btn{background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;padding:0 4px;flex-shrink:0}
    .cat-del-btn:active{color:#dc2626}
    .add-cat-row{display:flex;gap:8px;align-items:center}
    .add-cat-row input{flex:1;height:36px;font-size:14px}
    .add-cat-btn{background:#4F46E5;color:white;border:none;border-radius:8px;height:36px;padding:0 14px;font-size:14px;cursor:pointer;white-space:nowrap;flex-shrink:0}
    .color-picker-row{display:flex;flex-wrap:wrap;gap:8px;padding:8px 0 4px}
    .color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent}
    .color-swatch.selected{border-color:#1a1a1a}

    /* CHARTS */
    .chart-wrap{position:relative;width:100%;height:180px;margin-bottom:1rem}
    .cat-bars{display:flex;flex-direction:column;gap:8px}
    .cat-bar-row{display:grid;grid-template-columns:70px 1fr 54px;align-items:center;gap:8px}
    .cat-bar-label{font-size:12px;color:#555;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .cat-bar-bg{background:#f0f0f0;border-radius:99px;height:8px;overflow:hidden}
    .cat-bar-fill{height:8px;border-radius:99px;transition:width .4s ease}
    .cat-bar-val{font-size:12px;color:#888;font-variant-numeric:tabular-nums}

    /* HISTORY */
    .month-card{background:white;border-radius:14px;padding:.9rem 1rem;margin-bottom:.75rem;box-shadow:0 1px 3px rgba(0,0,0,.07)}
    .month-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
    .month-name{font-size:15px;font-weight:600}
    .month-meta{font-size:12px;color:#888;margin-top:2px}
    .month-chevron{font-size:18px;color:#ccc;transition:transform .2s}
    .month-chevron.open{transform:rotate(180deg)}
    .month-body{display:none;margin-top:12px;padding-top:12px;border-top:1px solid #f0f0f0}
    .month-body.open{display:block}
    .hist-chart-wrap{height:140px;margin-bottom:.75rem}
    .hist-page-section{margin-bottom:.75rem}
    .hist-page-title{font-size:12px;font-weight:600;color:#4F46E5;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
    .hist-entry-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;border-bottom:1px solid #f5f5f5;gap:8px}
    .hist-entry-row:last-child{border-bottom:none}
    .hist-entry-desc{color:#333;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .hist-entry-amt{color:#888;font-variant-numeric:tabular-nums;flex-shrink:0}
    .no-history{color:#bbb;font-size:14px;text-align:center;padding:2rem 1rem}

    /* MODALS */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:flex-end;justify-content:center}
    .modal-bg.open{display:flex}
    .modal{background:white;border-radius:20px 20px 0 0;padding:1.5rem 1.25rem calc(1.5rem + env(safe-area-inset-bottom));width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
    .modal h3{font-size:16px;font-weight:600;margin-bottom:.4rem}
    .modal p{font-size:14px;color:#666;margin-bottom:1rem}
    .modal input{margin-bottom:.75rem}
    .modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:.75rem}
    .btn-cancel{background:#f3f4f6;border:none;border-radius:8px;height:42px;font-size:15px;cursor:pointer;color:#444}
    .btn-confirm{background:#4F46E5;border:none;border-radius:8px;height:42px;font-size:15px;cursor:pointer;color:white;font-weight:500}
    .btn-confirm.danger{background:#dc2626}
    .btn-confirm:active{opacity:.85}
    .btn-full{width:100%;background:#4F46E5;border:none;border-radius:8px;height:42px;font-size:15px;cursor:pointer;color:white;font-weight:500;margin-top:.5rem}
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>💰 Finance Tracker</h1>
    <div class="header-actions">
      <button class="hbtn" onclick="openAddPage()">+ Page</button>
      <button class="hbtn" onclick="openResetModal()">↺ Reset</button>
    </div>
  </div>
  <div class="tabs-scroll" id="tabs"></div>
</header>

<div class="nav-pills">
  <button class="pill active" id="pill-tracker" onclick="switchView('tracker')">Tracker</button>
  <button class="pill" id="pill-charts" onclick="switchView('charts')">Charts</button>
  <button class="pill" id="pill-history" onclick="switchView('history')">History</button>
</div>
<div class="dots" id="dots"></div>
<div class="swipe-viewport" id="viewport">
  <div class="swipe-track" id="track"></div>
</div>
<div class="swipe-hint" id="swipe-hint"></div>

<!-- Add page modal -->
<div class="modal-bg" id="modal-page">
  <div class="modal">
    <h3>New page</h3>
    <p>Give your budget page a name</p>
    <input type="text" id="modal-page-input" placeholder="e.g. Savings, Rent, Fun money" maxlength="24" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modal-page')">Cancel</button>
      <button class="btn-confirm" onclick="confirmAddPage()">Add</button>
    </div>
  </div>
</div>

<!-- Reset modal -->
<div class="modal-bg" id="modal-reset">
  <div class="modal">
    <h3>Start new month?</h3>
    <p>Your current expenses will be saved to History. Budgets and page names are kept. This cannot be undone.</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modal-reset')">Cancel</button>
      <button class="btn-confirm danger" onclick="confirmReset()">Reset month</button>
    </div>
  </div>
</div>

<!-- Category manager modal -->
<div class="modal-bg" id="modal-cats">
  <div class="modal">
    <h3>Edit categories</h3>
    <p id="modal-cats-subtitle">Changes apply to this page only</p>
    <div class="cat-list" id="cat-list"></div>
    <div class="add-cat-row">
      <input type="text" id="new-cat-name" placeholder="New category name" maxlength="20" />
      <button class="add-cat-btn" onclick="addCategory()">Add</button>
    </div>
    <div id="color-picker" style="display:none">
      <div style="font-size:12px;color:#888;margin-top:10px;margin-bottom:2px">Pick a colour</div>
      <div class="color-picker-row" id="color-swatches"></div>
    </div>
    <button class="btn-full" onclick="closeModal('modal-cats')">Done</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
const PALETTE = [
  '#4F46E5','#7C3AED','#DB2777','#DC2626','#EA580C',
  '#D97706','#65A30D','#16A34A','#0891B2','#0284C7',
  '#6B7280','#1a1a1a'
];

const DEFAULT_CATS = [
  {id:'food',    name:'Food',       color:'#16A34A'},
  {id:'travel',  name:'Travel',     color:'#0284C7'},
  {id:'bills',   name:'Bills',      color:'#D97706'},
  {id:'fun',     name:'Fun',        color:'#7C3AED'},
  {id:'other',   name:'Other',      color:'#6B7280'},
];

function uid(){ return Math.random().toString(36).slice(2,9); }
function fmt(n){ return '$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function save(){ localStorage.setItem('ft4_state', JSON.stringify(state)); }
function monthLabel(d){ return new Date(d).toLocaleString('default',{month:'long',year:'numeric'}); }
function cloneDeep(x){ return JSON.parse(JSON.stringify(x)); }

function catById(cats, id){ return cats.find(c=>c.id===id) || {name:'Other',color:'#6B7280'}; }

function badgeHTML(cat){
  const bg = cat.color+'22';
  const tc = cat.color;
  return `<span class="badge" style="background:${bg};color:${tc}">${cat.name}</span>`;
}

// ---- STATE ----
let state = JSON.parse(localStorage.getItem('ft4_state') || 'null');
if (!state) {
  state = {
    pages:[
      {id:uid(),name:'Allowance', budget:0, entries:[], cats:cloneDeep(DEFAULT_CATS)},
      {id:uid(),name:'Necessities', budget:0, entries:[], cats:cloneDeep(DEFAULT_CATS)}
    ],
    history:[]
  };
  save();
}
// migrate old pages missing cats
state.pages.forEach(p=>{ if(!p.cats) p.cats=cloneDeep(DEFAULT_CATS); });

let current = 0;
let activeView = 'tracker';
let chartInstances = {};
let editingCatPageIdx = null;
let pickerTargetId = null;

// ---- VIEWS ----
function switchView(v){
  activeView=v;
  ['tracker','charts','history'].forEach(x=>{
    document.getElementById('pill-'+x).classList.toggle('active',x===v);
  });
  document.getElementById('dots').style.display = v==='tracker'?'flex':'none';
  document.getElementById('swipe-hint').style.display = v==='tracker'?'block':'none';
  renderTrack();
}

// ---- RENDER ----
function render(){ renderTabs(); renderDots(); renderTrack(); updateSwipeHint(); }

function renderTabs(){
  const el=document.getElementById('tabs');
  el.innerHTML='';
  if(activeView!=='tracker') return;
  state.pages.forEach((p,i)=>{
    const btn=document.createElement('button');
    btn.className='tab'+(i===current?' active':'');
    btn.innerHTML=`${p.name}${state.pages.length>1?`<span class="dx" onclick="deletePage(event,${i})">×</span>`:''}`;
    btn.onclick=e=>{ if(!e.target.classList.contains('dx')) goTo(i); };
    el.appendChild(btn);
    if(i===current) btn.scrollIntoView({block:'nearest',inline:'center'});
  });
}

function renderDots(){
  const el=document.getElementById('dots');
  el.innerHTML='';
  if(activeView!=='tracker') return;
  state.pages.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===current?' active':'');
    el.appendChild(d);
  });
}

function renderTrack(){
  const track=document.getElementById('track');
  Object.values(chartInstances).forEach(c=>c.destroy());
  chartInstances={};

  if(activeView==='tracker'){
    track.innerHTML='';
    state.pages.forEach((p,i)=>{
      const pg=document.createElement('div');
      pg.className='page';
      pg.innerHTML=trackerHTML(p,i);
      track.appendChild(pg);
    });
    track.style.transform=`translateX(-${current*100}vw)`;
  } else if(activeView==='charts'){
    track.innerHTML=`<div class="page"><div class="pad">${chartsHTML()}</div></div>`;
    track.style.transform='translateX(0)';
    requestAnimationFrame(()=>renderCharts());
  } else if(activeView==='history'){
    track.innerHTML=`<div class="page"><div class="pad">${historyHTML()}</div></div>`;
    track.style.transform='translateX(0)';
  }
}

// ---- TRACKER ----
function trackerHTML(p,idx){
  const spent=p.entries.reduce((s,e)=>s+e.amount,0);
  const rem=p.budget-spent;
  const pct=p.budget>0?Math.min((spent/p.budget)*100,100):0;
  const barCls=pct>=100?'over':pct>=80?'warn':'';
  const catOptions = p.cats.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  return `<div class="pad">
    <div class="summary-grid">
      <div class="metric"><div class="metric-label">Budget</div><div class="metric-value">${fmt(p.budget)}</div></div>
      <div class="metric"><div class="metric-label">Spent</div><div class="metric-value danger">${fmt(spent)}</div></div>
      <div class="metric"><div class="metric-label">Left</div><div class="metric-value ${rem<0?'danger':'success'}">${(rem<0?'-':'')+fmt(rem)}</div></div>
    </div>
    <div class="card">
      <div class="card-title">Monthly budget</div>
      <div class="budget-row">
        <label>Total budget</label>
        <input type="number" value="${p.budget||''}" placeholder="$0.00" min="0" step="0.01" inputmode="decimal" onchange="setBudget(${idx},this.value)" />
      </div>
      <div class="progress-bar-bg"><div class="progress-bar ${barCls}" style="width:${pct}%"></div></div>
    </div>
    <div class="card">
      <div class="card-title">
        Add expense
        <button class="card-title-btn" onclick="openCatModal(${idx})">Edit categories</button>
      </div>
      <div class="add-row">
        <input type="text" placeholder="Description" id="desc-${idx}" autocomplete="off" />
        <input type="number" placeholder="$0.00" id="amt-${idx}" min="0" step="0.01" inputmode="decimal" onkeydown="if(event.key==='Enter') addEntry(${idx})" />
        <button class="add-btn" onclick="addEntry(${idx})">+</button>
      </div>
      <select id="cat-${idx}">${catOptions}</select>
    </div>
    <div class="card">
      <div class="card-title">Expenses</div>
      ${p.entries.length===0
        ? '<div class="empty">No expenses yet</div>'
        : `<table class="entries-table">
            <thead><tr><th>Description</th><th>Cat</th><th class="r">Amount</th><th></th></tr></thead>
            <tbody>${p.entries.map((e,ei)=>{
              const cat=catById(p.cats,e.cat);
              return `<tr>
                <td>${e.desc}</td>
                <td>${badgeHTML(cat)}</td>
                <td class="r">${fmt(e.amount)}</td>
                <td><button class="del-btn" onclick="deleteEntry(${idx},${ei})">×</button></td>
              </tr>`;
            }).join('')}</tbody></table>`}
    </div>
  </div>`;
}

// ---- CHARTS ----
function chartsHTML(){
  let html='';
  state.pages.forEach((p,i)=>{
    html+=`<div class="card">
      <div class="card-title">${p.name} — by category</div>
      <div class="chart-wrap"><canvas id="chart-donut-${i}"></canvas></div>
      <div class="cat-bars" id="bars-${i}"></div>
    </div>`;
  });
  if(state.pages.some(p=>p.budget>0||p.entries.length>0)){
    html+=`<div class="card">
      <div class="card-title">Budget vs spent — all pages</div>
      <div class="chart-wrap"><canvas id="chart-compare"></canvas></div>
    </div>`;
  }
  return html;
}

function renderCharts(){
  state.pages.forEach((p,i)=>{
    const el=document.getElementById(`chart-donut-${i}`);
    const barsEl=document.getElementById(`bars-${i}`);
    if(!el) return;
    const spent=p.entries.reduce((s,e)=>s+e.amount,0);
    const catTotals=p.cats.map(c=>({cat:c,total:p.entries.filter(e=>e.cat===c.id).reduce((s,e)=>s+e.amount,0)})).filter(x=>x.total>0);

    if(catTotals.length===0){
      if(barsEl) barsEl.innerHTML='<div class="empty" style="padding:.5rem 0">No expenses yet</div>';
      return;
    }

    chartInstances[`donut-${i}`]=new Chart(el,{
      type:'doughnut',
      data:{
        labels:catTotals.map(x=>x.cat.name),
        datasets:[{data:catTotals.map(x=>x.total),backgroundColor:catTotals.map(x=>x.cat.color),borderWidth:0,hoverOffset:6}]
      },
      options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'right',labels:{font:{size:12},boxWidth:12,padding:10}},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw)}}},cutout:'60%'}
    });

    if(barsEl){
      barsEl.innerHTML=catTotals.map(x=>`
        <div class="cat-bar-row">
          <div class="cat-bar-label">${x.cat.name}</div>
          <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${spent>0?(x.total/spent*100):0}%;background:${x.cat.color}"></div></div>
          <div class="cat-bar-val">${fmt(x.total)}</div>
        </div>`).join('');
    }
  });

  const cmpEl=document.getElementById('chart-compare');
  if(cmpEl){
    chartInstances['compare']=new Chart(cmpEl,{
      type:'bar',
      data:{
        labels:state.pages.map(p=>p.name),
        datasets:[
          {label:'Budget',data:state.pages.map(p=>p.budget),backgroundColor:'#c7d2fe',borderRadius:6},
          {label:'Spent',data:state.pages.map(p=>p.entries.reduce((s,e)=>s+e.amount,0)),backgroundColor:'#4F46E5',borderRadius:6}
        ]
      },
      options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{labels:{font:{size:12},boxWidth:12}},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw)}}},scales:{y:{ticks:{callback:v=>'$'+v.toLocaleString()},grid:{color:'#f0f0f0'}},x:{grid:{display:false}}}}
    });
  }
}

// ---- HISTORY ----
function historyHTML(){
  if(state.history.length===0) return '<div class="no-history">No history yet.<br><br>Use ↺ Reset at month end<br>to archive the current month here.</div>';
  return [...state.history].reverse().map((month,ri)=>{
    const i=state.history.length-1-ri;
    const totalSpent=month.pages.reduce((s,p)=>s+p.entries.reduce((ss,e)=>ss+e.amount,0),0);
    return `<div class="month-card">
      <div class="month-header" onclick="toggleMonth(${i})">
        <div>
          <div class="month-name">${month.label}</div>
          <div class="month-meta">Total spent: ${fmt(totalSpent)} · ${month.pages.length} page${month.pages.length!==1?'s':''}</div>
        </div>
        <div class="month-chevron" id="chev-${i}">⌄</div>
      </div>
      <div class="month-body" id="mbody-${i}">
        <div class="hist-chart-wrap"><canvas id="hist-chart-${i}"></canvas></div>
        ${month.pages.map(p=>{
          const ps=p.entries.reduce((s,e)=>s+e.amount,0);
          const cats=p.cats||DEFAULT_CATS;
          return `<div class="hist-page-section">
            <div class="hist-page-title">${p.name} — ${fmt(ps)} / ${fmt(p.budget)}</div>
            ${p.entries.length===0
              ?'<div style="font-size:13px;color:#bbb;padding:4px 0">No expenses</div>'
              :p.entries.map(e=>{
                const cat=catById(cats,e.cat);
                return `<div class="hist-entry-row">
                  <span class="hist-entry-desc">${e.desc}</span>
                  ${badgeHTML(cat)}
                  <span class="hist-entry-amt">${fmt(e.amount)}</span>
                </div>`;
              }).join('')}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleMonth(i){
  const body=document.getElementById(`mbody-${i}`);
  const chev=document.getElementById(`chev-${i}`);
  const isOpen=body.classList.toggle('open');
  chev.classList.toggle('open',isOpen);
  if(isOpen) setTimeout(()=>renderHistoryChart(i),50);
}

function renderHistoryChart(i){
  if(chartInstances[`hist-${i}`]) return;
  const el=document.getElementById(`hist-chart-${i}`);
  if(!el) return;
  const month=state.history[i];
  chartInstances[`hist-${i}`]=new Chart(el,{
    type:'bar',
    data:{
      labels:month.pages.map(p=>p.name),
      datasets:[
        {label:'Budget',data:month.pages.map(p=>p.budget),backgroundColor:'#c7d2fe',borderRadius:5},
        {label:'Spent',data:month.pages.map(p=>p.entries.reduce((s,e)=>s+e.amount,0)),backgroundColor:'#4F46E5',borderRadius:5}
      ]
    },
    options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{labels:{font:{size:11},boxWidth:10}},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw)}}},scales:{y:{ticks:{callback:v=>'$'+v.toLocaleString()},grid:{color:'#f0f0f0'}},x:{grid:{display:false}}}}
  });
}

// ---- CATEGORY MODAL ----
function openCatModal(idx){
  editingCatPageIdx=idx;
  pickerTargetId=null;
  document.getElementById('modal-cats-subtitle').textContent=`Editing categories for "${state.pages[idx].name}"`;
  renderCatList();
  document.getElementById('color-picker').style.display='none';
  document.getElementById('modal-cats').classList.add('open');
}

function renderCatList(){
  const p=state.pages[editingCatPageIdx];
  const el=document.getElementById('cat-list');
  el.innerHTML=p.cats.map((c,ci)=>`
    <div class="cat-row">
      <button class="cat-color-btn" style="background:${c.color}" onclick="openColorPicker('${c.id}')">
        ${pickerTargetId===c.id?'✓':''}
      </button>
      <input class="cat-name-input" type="text" value="${c.name}" maxlength="20"
        onchange="renameCat('${c.id}',this.value)" />
      <button class="cat-del-btn" onclick="deleteCat('${c.id}')">×</button>
    </div>`).join('');
}

function openColorPicker(catId){
  pickerTargetId=catId;
  const picker=document.getElementById('color-picker');
  picker.style.display='block';
  const swatches=document.getElementById('color-swatches');
  const p=state.pages[editingCatPageIdx];
  const cat=catById(p.cats,catId);
  swatches.innerHTML=PALETTE.map(col=>`
    <div class="color-swatch ${cat.color===col?'selected':''}" style="background:${col}" onclick="pickColor('${catId}','${col}')"></div>`).join('');
  renderCatList();
}

function pickColor(catId,color){
  const p=state.pages[editingCatPageIdx];
  const cat=p.cats.find(c=>c.id===catId);
  if(cat) cat.color=color;
  save();
  document.getElementById('color-picker').style.display='none';
  pickerTargetId=null;
  renderCatList();
}

function renameCat(catId,name){
  const p=state.pages[editingCatPageIdx];
  const cat=p.cats.find(c=>c.id===catId);
  if(cat&&name.trim()) cat.name=name.trim();
  save();
}

function deleteCat(catId){
  const p=state.pages[editingCatPageIdx];
  if(p.cats.length<=1){ alert("You need at least one category."); return; }
  const inUse=p.entries.some(e=>e.cat===catId);
  if(inUse&&!confirm("Some expenses use this category. They'll show as 'Other'. Continue?")) return;
  p.entries.forEach(e=>{ if(e.cat===catId) e.cat='other'; });
  p.cats=p.cats.filter(c=>c.id!==catId);
  save(); renderCatList();
}

function addCategory(){
  const inp=document.getElementById('new-cat-name');
  const name=inp.value.trim();
  if(!name) return;
  const p=state.pages[editingCatPageIdx];
  const color=PALETTE[p.cats.length % PALETTE.length];
  p.cats.push({id:uid(),name,color});
  inp.value='';
  save(); renderCatList();
}
document.getElementById('new-cat-name').addEventListener('keydown',e=>{ if(e.key==='Enter') addCategory(); });

// ---- TRACKER ACTIONS ----
function goTo(i){
  current=Math.max(0,Math.min(i,state.pages.length-1));
  document.getElementById('track').style.transform=`translateX(-${current*100}vw)`;
  renderTabs(); renderDots(); updateSwipeHint();
}

function updateSwipeHint(){
  const el=document.getElementById('swipe-hint');
  if(activeView!=='tracker'||state.pages.length<=1){el.textContent='';return;}
  if(current===0) el.textContent='Swipe left for '+state.pages[1].name;
  else if(current===state.pages.length-1) el.textContent='Swipe right for '+state.pages[current-1].name;
  else el.textContent=state.pages[current-1].name+' ← swipe → '+state.pages[current+1].name;
}

function setBudget(idx,val){
  state.pages[idx].budget=parseFloat(val)||0;
  save();
  const pg=document.getElementById('track').children[idx];
  if(pg) pg.innerHTML=trackerHTML(state.pages[idx],idx);
}

function addEntry(idx){
  const desc=document.getElementById(`desc-${idx}`).value.trim();
  const amount=parseFloat(document.getElementById(`amt-${idx}`).value);
  const cat=document.getElementById(`cat-${idx}`).value;
  if(!desc||isNaN(amount)||amount<=0) return;
  state.pages[idx].entries.push({desc,amount,cat,date:new Date().toISOString()});
  save();
  const pg=document.getElementById('track').children[idx];
  if(pg) pg.innerHTML=trackerHTML(state.pages[idx],idx);
}

function deleteEntry(idx,ei){
  state.pages[idx].entries.splice(ei,1);
  save();
  const pg=document.getElementById('track').children[idx];
  if(pg) pg.innerHTML=trackerHTML(state.pages[idx],idx);
}

function deletePage(e,idx){
  e.stopPropagation();
  if(!confirm(`Delete "${state.pages[idx].name}"?`)) return;
  state.pages.splice(idx,1);
  if(current>=state.pages.length) current=state.pages.length-1;
  save(); render();
}

// ---- RESET ----
function openResetModal(){ document.getElementById('modal-reset').classList.add('open'); }
function confirmReset(){
  state.history.push({
    key:Date.now().toString(),
    label:monthLabel(new Date()),
    pages:cloneDeep(state.pages)
  });
  state.pages.forEach(p=>{ p.entries=[]; });
  save(); closeModal('modal-reset'); switchView('tracker'); render();
}

// ---- ADD PAGE ----
function openAddPage(){
  document.getElementById('modal-page').classList.add('open');
  setTimeout(()=>document.getElementById('modal-page-input').focus(),100);
}
function confirmAddPage(){
  const name=document.getElementById('modal-page-input').value.trim()||'New page';
  state.pages.push({id:uid(),name,budget:0,entries:[],cats:cloneDeep(DEFAULT_CATS)});
  current=state.pages.length-1;
  save(); render(); closeModal('modal-page');
  if(activeView!=='tracker') switchView('tracker');
}
document.getElementById('modal-page-input').addEventListener('keydown',e=>{ if(e.key==='Enter') confirmAddPage(); });

function closeModal(id){
  document.getElementById(id).classList.remove('open');
  const inp=document.querySelector(`#${id} input`);
  if(inp) inp.value='';
  if(id==='modal-cats' && editingCatPageIdx!==null){
    const pg=document.getElementById('track').children[editingCatPageIdx];
    if(pg) pg.innerHTML=trackerHTML(state.pages[editingCatPageIdx],editingCatPageIdx);
    editingCatPageIdx=null;
  }
}
document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',e=>{ if(e.target===m) closeModal(m.id); }));

// ---- SWIPE ----
let touchStartX=0,touchStartY=0,dragging=false,dragDelta=0;
const track=document.getElementById('track');
document.getElementById('viewport').addEventListener('touchstart',e=>{
  touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY;
  dragging=false; dragDelta=0; track.style.transition='none';
},{passive:true});
document.getElementById('viewport').addEventListener('touchmove',e=>{
  if(activeView!=='tracker') return;
  const dx=e.touches[0].clientX-touchStartX;
  const dy=e.touches[0].clientY-touchStartY;
  if(!dragging&&Math.abs(dy)>Math.abs(dx)) return;
  dragging=true; dragDelta=dx;
  track.style.transform=`translateX(${-(current*window.innerWidth)+dx}px)`;
},{passive:true});
document.getElementById('viewport').addEventListener('touchend',()=>{
  if(activeView!=='tracker') return;
  track.style.transition='transform .3s cubic-bezier(.4,0,.2,1)';
  if(Math.abs(dragDelta)>60){
    if(dragDelta<0&&current<state.pages.length-1) goTo(current+1);
    else if(dragDelta>0&&current>0) goTo(current-1);
    else goTo(current);
  } else goTo(current);
  dragging=false; dragDelta=0;
},{passive:true});

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
render();
</script>
</body>
</html>
